<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Jeopardy Board Creator</title>
    <link rel="stylesheet" type="text/css" href="../bootstrap-static/3.3.5/css/bootstrap.min.css" />
    <link rel="stylesheet" type="text/css" href="../bootstrap-static/3.3.5/css/bootstrap-theme.min.css" />
    <link rel="stylesheet" type="text/css" href="../css/jeopardy.css" />
    <style>
        .creator-section {
            margin-bottom: 30px;
        }
        .round-title {
            font-family: Impact, sans-serif;
            font-size: 32px;
            color: goldenrod;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 2px solid goldenrod;
            padding-bottom: 8px;
            margin-bottom: 14px;
        }
        .creator-board {
            background-color: black;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .board-row {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            min-width: max-content;
        }
        .category-col {
            flex: 1;
            min-width: 130px;
            max-width: 220px;
        }
        .category-header {
            position: relative;
            margin-bottom: 6px;
            background-color: navy;
            border: 2px solid #000;
            border-radius: 3px;
            padding: 2px;
        }
        .category-name-input {
            width: 100%;
            background: transparent;
            color: white;
            border: none;
            text-align: center;
            font-family: Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            padding: 8px 22px 8px 4px;
            text-transform: uppercase;
            outline: none;
        }
        .category-name-input::placeholder {
            color: #aaa;
        }
        .remove-cat-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: transparent;
            border: none;
            color: #ff6666;
            font-size: 14px;
            cursor: pointer;
            line-height: 1;
            padding: 2px 4px;
        }
        .remove-cat-btn:hover {
            color: #ff2222;
        }
        .question-tile {
            background-color: navy;
            border: 2px solid #000080;
            margin-bottom: 6px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            color: goldenrod;
            font-family: Impact, sans-serif;
            font-size: 26px;
            border-radius: 3px;
            display: block;
            width: 100%;
            transition: border-color 0.15s;
        }
        .question-tile:hover {
            border-color: goldenrod;
            background-color: #000080;
        }
        .dd-badge {
            display: block;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 10px;
            color: #ffd700;
            font-weight: bold;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .add-q-btn {
            width: 100%;
            background: transparent;
            border: 1px dashed #555;
            color: #aaa;
            font-size: 11px;
            padding: 6px 2px;
            border-radius: 3px;
            cursor: pointer;
        }
        .add-q-btn:hover {
            border-color: goldenrod;
            color: goldenrod;
        }
        .add-cat-col {
            display: flex;
            align-items: flex-start;
            padding-top: 4px;
        }
        .add-cat-btn {
            background: transparent;
            border: 1px dashed #555;
            color: #aaa;
            font-size: 12px;
            padding: 8px 10px;
            border-radius: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .add-cat-btn:hover {
            border-color: #4fc3f7;
            color: #4fc3f7;
        }
        /* Final Jeopardy */
        .final-jeopardy-board {
            background-color: black;
            padding: 20px;
            border-radius: 4px;
        }
        .fj-label {
            color: goldenrod;
            font-family: Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }
        .fj-input {
            width: 100%;
            background: navy;
            color: white;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 8px 10px;
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }
        .fj-input:focus {
            border-color: goldenrod;
        }
        .fj-textarea {
            width: 100%;
            background: navy;
            color: white;
            border: 1px solid #333;
            border-radius: 3px;
            padding: 8px 10px;
            font-size: 16px;
            margin-bottom: 12px;
            resize: vertical;
            outline: none;
        }
        .fj-textarea:focus {
            border-color: goldenrod;
        }
        /* Edit modal overrides */
        #edit-modal .modal-content {
            background-color: navy;
            color: white;
        }
        #edit-modal .modal-header {
            border-bottom-color: #333;
        }
        #edit-modal .modal-footer {
            border-top-color: #333;
        }
        #edit-modal .form-control {
            background-color: #000080;
            color: white;
            border-color: #333;
        }
        #edit-modal .form-control:focus {
            border-color: goldenrod;
            box-shadow: none;
        }
        #edit-modal label {
            color: goldenrod;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #edit-modal .modal-title {
            font-family: Impact, sans-serif;
            color: goldenrod;
            font-size: 24px;
            letter-spacing: 1px;
        }
        /* Page header */
        .page-header-bar {
            background-color: navy;
            border-bottom: 3px solid goldenrod;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .page-header-bar h1 {
            font-family: Impact, sans-serif;
            color: goldenrod;
            font-size: 42px;
            letter-spacing: 3px;
            margin: 0;
            text-transform: uppercase;
        }
        .page-header-bar p {
            color: #aaa;
            font-size: 13px;
            margin: 4px 0 0 0;
        }
        /* Bottom toolbar */
        .bottom-toolbar {
            background-color: black;
            border-top: 2px solid goldenrod;
            padding: 16px 20px;
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-download {
            background-color: goldenrod;
            color: black;
            border: none;
            font-family: Helvetica, Arial, sans-serif;
            font-weight: bold;
            font-size: 14px;
            padding: 10px 24px;
            border-radius: 3px;
            cursor: pointer;
            letter-spacing: 1px;
        }
        .btn-download:hover {
            background-color: #ffd700;
        }
        .btn-load-json {
            background-color: transparent;
            color: #aaa;
            border: 1px solid #555;
            font-family: Helvetica, Arial, sans-serif;
            font-size: 14px;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
        }
        .btn-load-json:hover {
            border-color: #aaa;
            color: white;
        }
        .toolbar-hint {
            color: #555;
            font-size: 12px;
            margin-left: auto;
        }
    </style>
</head>
<body>

    <div class="page-header-bar">
        <h1>Board Creator</h1>
        <p>Click any question tile to edit it. Use the toolbar below to download or load a game file.</p>
    </div>

    <div class="container-fluid">

        <!-- Jeopardy Round -->
        <div class="creator-section">
            <div class="round-title">Jeopardy</div>
            <div class="creator-board">
                <div id="board-jeopardy"></div>
            </div>
        </div>

        <!-- Double Jeopardy Round -->
        <div class="creator-section">
            <div class="round-title">Double Jeopardy</div>
            <div class="creator-board">
                <div id="board-double-jeopardy"></div>
            </div>
        </div>

        <!-- Final Jeopardy -->
        <div class="creator-section">
            <div class="round-title">Final Jeopardy</div>
            <div class="final-jeopardy-board">
                <div class="row">
                    <div class="col-md-4">
                        <label class="fj-label" for="fj-category">Category</label>
                        <input id="fj-category" type="text" class="fj-input" placeholder="FINAL JEOPARDY CATEGORY">
                    </div>
                    <div class="col-md-5">
                        <label class="fj-label" for="fj-question">Question</label>
                        <textarea id="fj-question" class="fj-textarea" rows="3" placeholder="ENTER THE FINAL JEOPARDY QUESTION"></textarea>
                    </div>
                    <div class="col-md-3">
                        <label class="fj-label" for="fj-answer">Answer</label>
                        <input id="fj-answer" type="text" class="fj-input" placeholder="Enter the answer">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Bottom Toolbar -->
    <div class="bottom-toolbar">
        <button id="download-btn" class="btn-download">&#11015; Download JSON</button>
        <button id="load-btn" class="btn-load-json">&#128194; Load JSON File</button>
        <input type="file" id="load-file-input" accept=".json" style="display:none">
        <span class="toolbar-hint">Changes are reflected in real time &mdash; download when ready.</span>
    </div>

    <!-- Edit Question Modal -->
    <div class="modal fade" id="edit-modal" role="dialog" aria-labelledby="edit-modal-title" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-hidden="true" style="color:white; opacity:0.7;">&times;</button>
                    <h4 class="modal-title" id="edit-modal-title">Edit Question</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="edit-question">Question</label>
                        <textarea id="edit-question" class="form-control" rows="4" placeholder="ENTER THE QUESTION"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit-answer">Answer</label>
                        <input id="edit-answer" type="text" class="form-control" placeholder="Enter the answer">
                    </div>
                    <div class="row">
                        <div class="col-xs-6">
                            <div class="form-group">
                                <label for="edit-value">Point Value</label>
                                <input id="edit-value" type="number" class="form-control" placeholder="200">
                            </div>
                        </div>
                        <div class="col-xs-6">
                            <div class="form-group">
                                <label style="display:block">&nbsp;</label>
                                <label style="font-size:14px; text-transform:none; letter-spacing:0; color:white; cursor:pointer; font-weight:normal;">
                                    <input id="edit-daily-double" type="checkbox" style="margin-right:6px;">
                                    Daily Double
                                </label>
                            </div>
                        </div>
                    </div>
                    <div id="modal-image-section"></div>
                </div>
                <div class="modal-footer">
                    <button id="edit-delete-btn" type="button" class="btn btn-danger pull-left">Delete Question</button>
                    <button type="button" class="btn btn-primary" data-dismiss="modal">Save &amp; Close</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="../js/jquery-latest.min.js"></script>
    <script type="text/javascript" src="../bootstrap-static/3.3.5/js/bootstrap.min.js"></script>
    <script type="text/javascript" src="./creator.js"></script>
</body>
</html>
